                    ...INIT_CRITERIA.map((cr,ci)=>React.createElement('tr',{key:ci,style:{borderTop:"1px solid #e6f5f6"}},
                      React.createElement('td',{style:{padding:"8px 14px",fontSize:11,fontWeight:600,color:"#334155"}},cr.name,React.createElement('br'),React.createElement('span',{style:{fontSize:10,color:"#94a3b8"}},`(${cr.weight}%)`)),
                      ...cmpList.map(c=>{
                        const s=(c.scores||[]).find(s=>s.criterion===cr.name)||{score:0};
                        const best=Math.max(...cmpList.map(cc=>(cc.scores||[]).find(ss=>ss.criterion===cr.name)?.score||0));
                        return React.createElement('td',{key:c.id,style:{padding:"8px 14px",textAlign:"center"}},
                          React.createElement('span',{style:{fontWeight:700,fontSize:14,color:s.score===best?BL:"#94a3b8"}},s.score),
                          React.createElement('div',{style:{width:44,margin:"3px auto 0"}},React.createElement(ScoreBar,{score:s.score,color:s.score===best?BL:"#cbd5e1"}))
                        );
                      })
                    ))
                  )
                )
              )
              :React.createElement('div',{style:{textAlign:"center",padding:50,color:"#94a3b8",background:"#fff",borderRadius:14}},"Sélectionnez au moins 2 candidats")
          ),

          tab==="notes"&&React.createElement(React.Fragment,null,...ranked.map((c,i)=>
            React.createElement('div',{key:c.id,style:{background:"#fff",borderRadius:12,padding:18,marginBottom:10,boxShadow:"0 2px 10px rgba(3,131,140,.06)",borderLeft:`4px solid ${COLORS[i%COLORS.length]}`}},
              React.createElement('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},
                React.createElement('div',{style:{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${COLORS[i%COLORS.length]},${COLORS[(i+2)%COLORS.length]})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800}},c.name?.[0]),
                React.createElement('div',null,
                  React.createElement('p',{style:{margin:0,fontWeight:700,color:"#1a4a4e",fontSize:13}},c.name),
                  React.createElement('p',{style:{margin:0,fontSize:11,color:"#94a3b8"}},`Score : ${c.global}/100 · 🧭 ${c.coherenceScore}% · 📌 ${c.stabiliteScore}%`)
                )
              ),
              React.createElement('textarea',{value:notes[c.id]||"",onChange:e=>setNotes(p=>({...p,[c.id]:e.target.value})),placeholder:"Notes, impressions, décision finale...",style:{width:"100%",minHeight:75,padding:10,border:"1px solid #e2e8f0",borderRadius:9,fontSize:13,resize:"vertical",outline:"none",boxSizing:"border-box",fontFamily:"inherit",background:"#f8fafc"},onFocus:e=>e.target.style.border=`1px solid ${BL}`,onBlur:e=>e.target.style.border="1px solid #e2e8f0"})
            )
          ))
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
