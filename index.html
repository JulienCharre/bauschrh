function toB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(f);});}

async function callAPI(key,messages,useSearch){
  for(let i=0;i<3;i++){
    const body={model:"claude-sonnet-4-20250514",max_tokens:useSearch?3000:2000,system:"HR expert. Reply ONLY with valid JSON, no markdown.",messages};
    if(useSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
    const d=await r.json();
    if(r.status===529||d.error?.type==="overloaded_error"){if(i<2){await new Promise(res=>setTimeout(res,3000*(i+1)));continue;}throw new Error("overloaded");}
    if(!r.ok)throw new Error(d.error?.message||JSON.stringify(d));
    const texts=(d.content||[]).filter(b=>b.type==="text");
    if(!texts.length)throw new Error("No text response");
    return texts[texts.length-1].text.replace(/```json|```/g,"").trim();
  }
}

    if(!apiKey.trim())return;

  }

    if(!f)return;
    if(f.type==="application/pdf"){setJdFile({name:f.name});setJdMode("pdf");}

  }

    setLoading(true);setLoadMsg(t.analyzingJD);setErr("");

      const p=JSON.parse(raw);
      setCriteria(p.criteria);
      setAnalysisCrit(p.criteria[0]?.name||"");
      setPage("criteria");

      const raw=await callAPI(apiKey,[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}]}],true);
      const c=JSON.parse(raw);

      setCandidates(p=>[...p,c].sort((a,b)=>b.global-a.global));

    setLoading(false);
  }
