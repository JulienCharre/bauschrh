async function claude(key,messages,retries=3){
  for(let i=0;i<retries;i++){
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:"Expert RH. Réponds UNIQUEMENT en JSON valide, sans markdown ni backticks.",messages})
    });
    const d=await r.json();
    if(r.status===529||d.error?.type==="overloaded_error"){
      if(i<retries-1){await new Promise(res=>setTimeout(res,3000*(i+1)));continue;}
      throw new Error("overloaded");
    }
    if(!r.ok)throw new Error(d.error?.message||JSON.stringify(d));
    return d.content[0].text.replace(/```json|```/g,"").trim();
  }
}

async function claudeWithSearch(key,messages,retries=3){
  for(let i=0;i<retries;i++){
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,system:"Expert RH rigoureux. Réponds UNIQUEMENT en JSON valide, sans markdown ni backticks.",tools:[{type:"web_search_20250305",name:"web_search"}],messages})
    });
    const d=await r.json();
    if(r.status===529||d.error?.type==="overloaded_error"){
      if(i<retries-1){await new Promise(res=>setTimeout(res,3000*(i+1)));continue;}
      throw new Error("overloaded");
    }
    if(!r.ok)throw new Error(d.error?.message||JSON.stringify(d));
    const texts=(d.content||[]).filter(b=>b.type==="text");
    if(!texts.length)throw new Error("Aucune réponse texte reçue");
    return texts[texts.length-1].text.replace(/```json|```/g,"").trim();
  }
}
